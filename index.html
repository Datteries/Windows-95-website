<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 95</title>

<style>
:root{
  --bg:#008080;
  --win:#c0c0c0;
  --dark:#000;
  --light:#fff;
  --title:#000080;
}

body{
  margin:0;
  background:var(--bg);
  font-family:"MS Sans Serif", Tahoma, sans-serif;
  overflow:hidden;
}

/* Desktop icons */
.desktop-icon{
  position:absolute;
  width:80px;
  text-align:center;
  color:white;
  font-size:12px;
  cursor:pointer;
}

/* Window */
.window{
  position:absolute;
  width:420px;
  height:300px;
  background:var(--win);
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  display:none;
  resize:both;
  overflow:hidden;
}

/* Title bar */
.title-bar{
  background:#000080;
  color:white;
  padding:3px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:grab;
}

.window-controls{
  display:flex;
}

.btn{
  width:18px;
  height:18px;
  margin-left:2px;
  background:#c0c0c0;
  border:1px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  text-align:center;
  cursor:pointer;
  font-size:12px;
}

.btn:active{
  box-shadow: inset 2px 2px #000, inset -2px -2px #fff;
}

/* Content */
.content{
  height:calc(100% - 24px);
  display:flex;
  flex-direction:column;
  padding:6px;
}

textarea{
  flex:1;
}

iframe{
  flex:1;
  border:1px solid #000;
}

/* Taskbar */
.taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:32px;
  background:#c0c0c0;
  display:flex;
  align-items:center;
}

.start-btn{
  margin-left:4px;
  padding:2px 10px;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  cursor:pointer;
}

.task-app{
  margin-left:4px;
  padding:2px 8px;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  cursor:pointer;
}

/* Start menu */
.start-menu{
  position:absolute;
  bottom:32px;
  left:0;
  background:#c0c0c0;
  border:2px solid #fff;
  display:none;
}

.start-item{
  padding:6px;
  cursor:pointer;
}
.start-item:hover{
  background:#000080;
  color:white;
}
</style>
</head>

<body>

<!-- Icons -->
<div class="desktop-icon" style="top:20px;left:20px;" onclick="openWindow('notepad')">📝<br>Notepad</div>
<div class="desktop-icon" style="top:100px;left:20px;" onclick="openWindow('browser')">🌐<br>Browser</div>

<!-- Notepad -->
<div id="notepad" class="window" style="top:100px;left:200px;">
  <div class="title-bar" ondblclick="toggleMaximize(this)">
    Notepad
    <div class="window-controls">
      <div class="btn" onclick="minimizeWindow('notepad')">_</div>
      <div class="btn" onclick="toggleMaximize(this)">▢</div>
      <div class="btn" onclick="closeWindow('notepad')">X</div>
    </div>
  </div>
  <div class="content">
    <textarea id="note"></textarea>
  </div>
</div>

<!-- Browser -->
<div id="browser" class="window" style="top:120px;left:260px;">
  <div class="title-bar" ondblclick="toggleMaximize(this)">
    Browser
    <div class="window-controls">
      <div class="btn" onclick="minimizeWindow('browser')">_</div>
      <div class="btn" onclick="toggleMaximize(this)">▢</div>
      <div class="btn" onclick="closeWindow('browser')">X</div>
    </div>
  </div>
  <div class="content">
    <input id="url" placeholder="enter site">
    <button onclick="loadPage()">Go</button>
    <iframe id="frame"></iframe>
  </div>
</div>

<!-- Start Menu -->
<div id="startMenu" class="start-menu">
  <div class="start-item" onclick="openWindow('notepad')">Notepad</div>
  <div class="start-item" onclick="openWindow('browser')">Browser</div>
</div>

<!-- Taskbar -->
<div class="taskbar">
  <div class="start-btn" onclick="toggleStart()">Start</div>
  <div id="taskApps"></div>
</div>

<script>
let z=10,drag=null,ox=0,oy=0;

function openWindow(id){
  const w=document.getElementById(id);
  w.style.display='block';
  w.style.zIndex=++z;
  addTask(id);
}

function closeWindow(id){
  document.getElementById(id).style.display='none';
  removeTask(id);
}

function minimizeWindow(id){
  document.getElementById(id).style.display='none';
}

function toggleMaximize(el){
  const win=el.closest('.window');
  if(!win.classList.contains('max')){
    win.dataset.top=win.style.top;
    win.dataset.left=win.style.left;
    win.dataset.width=win.style.width;
    win.dataset.height=win.style.height;

    win.style.top=0;
    win.style.left=0;
    win.style.width='100vw';
    win.style.height='calc(100vh - 32px)';
    win.classList.add('max');
  }else{
    win.style.top=win.dataset.top;
    win.style.left=win.dataset.left;
    win.style.width=win.dataset.width;
    win.style.height=win.dataset.height;
    win.classList.remove('max');
  }
}

/* Taskbar apps */
function addTask(id){
  if(document.getElementById('task-'+id)) return;
  const btn=document.createElement('div');
  btn.className='task-app';
  btn.id='task-'+id;
  btn.innerText=id;
  btn.onclick=()=>openWindow(id);
  document.getElementById('taskApps').appendChild(btn);
}

function removeTask(id){
  const el=document.getElementById('task-'+id);
  if(el) el.remove();
}

/* Start */
function toggleStart(){
  const m=document.getElementById('startMenu');
  m.style.display=m.style.display==='block'?'none':'block';
}

/* Drag */
window.addEventListener('mousedown',e=>{
  const bar=e.target.closest('.title-bar');
  if(!bar)return;
  drag=bar.parentElement;
  ox=e.clientX-drag.offsetLeft;
  oy=e.clientY-drag.offsetTop;
  drag.style.zIndex=++z;
});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  drag.style.left=(e.clientX-ox)+'px';
  drag.style.top=(e.clientY-oy)+'px';
});
window.addEventListener('mouseup',()=>drag=null);

/* Browser */
function loadPage(){
  let url=document.getElementById('url').value;
  if(!url.startsWith('http')) url='https://'+url;
  document.getElementById('frame').src=url;
}
</script>

</body>
</html>
