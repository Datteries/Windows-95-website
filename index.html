<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 95</title>

<style>
:root{
  --bg:#008080;
  --win:#c0c0c0;
  --dark:#000;
  --light:#fff;
  --title:#000080;
}

body{
  margin:0;
  background:var(--bg);
  font-family:"MS Sans Serif", Tahoma, sans-serif;
  overflow:hidden;
  user-select:none;
}

/* Desktop Icons */
.desktop-icon{
  position:absolute;
  width:115px;
  text-align:center;
  color:white;
  font-size:17px;
  cursor:pointer;
}

/* Windows */
.window{
  position:absolute;
  width:420px;
  min-width:220px;
  min-height:140px;
  background:var(--win);
  border:2px solid var(--light);
  box-shadow: inset -2px -2px var(--dark), inset 2px 2px var(--light);
  display:none;
  z-index:10;
  resize:both;
  overflow:hidden;
}

.title-bar{
  background:var(--title);
  color:white;
  padding:3px;
  font-size:13px;
  display:flex;
  justify-content:space-between;
  cursor:grab;
}

.close-btn{
  width:18px;
  height:18px;
  background:var(--win);
  border:1px solid var(--light);
  box-shadow: inset -2px -2px var(--dark), inset 2px 2px var(--light);
  text-align:center;
  line-height:14px;
  cursor:pointer;
  font-weight:bold;
}

.content{
  padding:10px;
  font-size:13px;
  height:calc(100% - 26px);
  display:flex;
  flex-direction:column;
}

button, input, textarea{
  background:var(--win);
  border:2px solid var(--light);
  box-shadow: inset -2px -2px var(--dark), inset 2px 2px var(--light);
  font-family:inherit;
}

/* Taskbar */
.taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:32px;
  background:#c0c0c0;
  border-top:2px solid #fff;
  box-shadow: inset 0 1px #fff;
  display:flex;
  align-items:center;
}

.start-btn{
  display:flex;
  align-items:center;
  gap:6px;
  margin-left:4px;
  padding:2px 10px;
  font-weight:bold;
  cursor:pointer;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  background:#c0c0c0;
}

.start-btn:active{
  box-shadow: inset 2px 2px #000, inset -2px -2px #fff;
}

.clock{
  margin-left:auto;
  margin-right:8px;
  padding:2px 8px;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  font-size:13px;
}

.start-menu{
  position:absolute;
  bottom:34px;
  left:4px;
  width:200px;
  background:#c0c0c0;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  display:none;
  z-index:100;
}

.start-header{
  background:#000080;
  color:white;
  padding:6px;
  font-weight:bold;
}

.start-item{
  padding:6px;
  cursor:pointer;
}

.start-item:hover{
  background:#000080;
  color:white;
}

canvas{
  background:white;
  border:1px solid black;
  cursor:crosshair;
}

textarea{
  width:100%;
  flex:1;
  resize:none;
}

iframe{
  flex:1;
  width:100%;
  border:1px solid #000;
  background:white;
}

/* NEW PAINT UI */
.paint-body{
  display:flex;
  height:calc(100% - 70px);
}

.toolbar{
  width:60px;
  border-right:2px solid #fff;
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:4px;
  padding:4px;
}

.tool{
  width:24px;
  height:24px;
  background:#e0e0e0;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
}

.canvas-area{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#808080;
}

.palette{
  display:flex;
  flex-wrap:wrap;
  padding:4px;
  border-top:2px solid #fff;
}

.color-box{
  width:20px;
  height:20px;
  margin:2px;
  border:1px solid black;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- Desktop Icons -->
<div class="desktop-icon" style="top:20px;left:20px;" onclick="openWindow('computer')">💻<br>Computer</div>
<div class="desktop-icon" style="top:110px;left:20px;" onclick="openWindow('notepad')">📝<br>Notepad</div>
<div class="desktop-icon" style="top:200px;left:20px;" onclick="openWindow('paint')">🎨<br>Paint</div>
<div class="desktop-icon" style="top:290px;left:20px;" onclick="openWindow('browser')">🌐<br>Browser</div>

<!-- Computer -->
<div id="computer" class="window" style="top:80px;left:150px;">
  <div class="title-bar">My Computer <div class="close-btn" onclick="closeWindow('computer')">X</div></div>
  <div class="content">
    <p>C:\ Drive</p>
    <p>A:\ Floppy</p>
    <p>Network</p>
  </div>
</div>

<!-- Notepad -->
<div id="notepad" class="window" style="top:120px;left:220px;">
  <div class="title-bar">Notepad <div class="close-btn" onclick="closeWindow('notepad')">X</div></div>
  <div class="content">
    <textarea id="note"></textarea>
  </div>
</div>

<!-- UPDATED PAINT -->
<div id="paint" class="window" style="top:160px;left:260px; width:520px; height:400px;">
  <div class="title-bar">Paint <div class="close-btn" onclick="closeWindow('paint')">X</div></div>

  <div style="padding:3px;border-bottom:2px solid #fff;font-size:13px;">
    File Edit View Image Colors Help
  </div>

  <div class="paint-body">
    <div class="toolbar">
      <div class="tool"></div><div class="tool"></div>
      <div class="tool"></div><div class="tool"></div>
      <div class="tool"></div><div class="tool"></div>
    </div>

    <div class="canvas-area">
      <canvas id="canvas" width="360" height="220"></canvas>
    </div>
  </div>

  <div class="palette" id="palette"></div>

  <!-- keep old controls hidden but functional -->
  <input type="color" id="color" style="display:none;">
  <input type="range" id="size" min="1" max="20" value="3" style="display:none;">
  <button onclick="clearCanvas()" style="display:none;">Clear</button>
</div>

<!-- Browser (UNCHANGED) -->
<div id="browser" class="window" style="top:100px;left:300px;">
  <div class="title-bar">🌐 Browser <div class="close-btn" onclick="closeWindow('browser')">X</div></div>
  <div class="content">
    <input id="url" placeholder="youtube.com or site">
    <button onclick="loadPage()">Go</button>
    <iframe id="pageFrame"></iframe>
  </div>
</div>

<!-- Start Menu -->
<div id="startMenu" class="start-menu">
  <div class="start-header">Windows 95</div>
  <div class="start-item" onclick="openWindow('computer')">📁 My Computer</div>
  <div class="start-item" onclick="openWindow('notepad')">📝 Notepad</div>
  <div class="start-item" onclick="openWindow('paint')">🎨 Paint</div>
  <div class="start-item" onclick="openWindow('browser')">🌐 Internet</div>
  <div class="start-item" onclick="alert('Shutting down...')">⏻ Shut Down</div>
</div>

<!-- Taskbar -->
<div class="taskbar">
  <div class="start-btn" onclick="toggleStart()"> Start</div>
  <div id="clock" class="clock">12:00 AM</div>
</div>

<script>
let drag=null,ox=0,oy=0,z=10;

function openWindow(id){
  const w=document.getElementById(id);
  w.style.display='block';
  w.style.zIndex=++z;
  closeStart();
}

function closeWindow(id){
  document.getElementById(id).style.display='none';
}

function toggleStart(){
  const m=document.getElementById('startMenu');
  m.style.display=(m.style.display==='block')?'none':'block';
}

function closeStart(){
  document.getElementById('startMenu').style.display='none';
}

/* Clock */
function updateClock(){
  const now = new Date();
  let h = now.getHours();
  let m = now.getMinutes();
  const ampm = h >= 12 ? "PM" : "AM";
  h = h % 12 || 12;
  if(m < 10) m = "0" + m;
  document.getElementById("clock").textContent = h + ":" + m + " " + ampm;
}
setInterval(updateClock, 1000);
updateClock();

/* Notepad */
document.getElementById('note').value=localStorage.getItem('note')||"";

/* Browser */
function loadPage(){
  let url=document.getElementById('url').value.trim();
  const frame=document.getElementById('pageFrame');

  if(!url){
    frame.srcdoc="<h3>Type a URL</h3>";
    return;
  }

  if(url.includes("youtube.com/watch") || url.includes("youtu.be")){
    let id="";
    if(url.includes("youtu.be")){
      id=url.split("/").pop();
    } else {
      const params=new URLSearchParams(url.split('?')[1]);
      id=params.get("v");
    }
    if(id){
      frame.src="https://www.youtube.com/embed/"+id;
      return;
    }
  }

  if(!url.startsWith("http")) url="https://"+url;
  frame.src=url;
}

/* Paint (same logic, enhanced palette) */
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
let draw=false;
let currentColor="#000";

canvas.addEventListener('mousedown',()=>draw=true);
canvas.addEventListener('mouseup',()=>draw=false);
canvas.addEventListener('mousemove',e=>{
  if(!draw)return;
  const r=canvas.getBoundingClientRect();
  ctx.fillStyle=currentColor;
  const s=document.getElementById('size').value;
  ctx.beginPath();
  ctx.arc(e.clientX-r.left,e.clientY-r.top,s,0,Math.PI*2);
  ctx.fill();
});

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
}

/* Palette */
const paletteColors=[
"#000","#808080","#fff","#800000","#ff0000","#808000","#ffff00",
"#008000","#00ff00","#008080","#00ffff","#000080","#0000ff","#800080","#ff00ff"
];

const palette=document.getElementById('palette');
paletteColors.forEach(c=>{
  const d=document.createElement('div');
  d.className='color-box';
  d.style.background=c;
  d.onclick=()=>{
    currentColor=c;
    document.getElementById('color').value=c;
  };
  palette.appendChild(d);
});

/* Drag windows */
window.addEventListener('mousedown',e=>{
  const bar=e.target.closest('.title-bar');
  if(!bar)return;
  drag=bar.parentElement;
  ox=e.clientX-drag.offsetLeft;
  oy=e.clientY-drag.offsetTop;
  drag.style.zIndex=++z;
});

window.addEventListener('mousemove',e=>{
  if(!drag)return;
  drag.style.left=(e.clientX-ox)+'px';
  drag.style.top=(e.clientY-oy)+'px';
});

window.addEventListener('mouseup',()=>drag=null);
</script>

</body>
</html>
