<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 95</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
:root{
  --bg:#008080;
  --win:#c0c0c0;
  --dark:#000;
  --light:#fff;
  --title:#000080;
}

body{
  margin:0;
  background:var(--bg);
  font-family:"MS Sans Serif", Tahoma, sans-serif;
  overflow:hidden;
  user-select:none;
}

/* Desktop Icons */
.desktop-icon{
  position:absolute;
  width:115px;
  text-align:center;
  color:white;
  font-size:17px;
  cursor:pointer;
}

/* Window */
.window{
  position:absolute;
  width:420px;
  min-width:220px;
  min-height:140px;
  background:var(--win);
  border:2px solid var(--light);
  box-shadow: inset -2px -2px var(--dark), inset 2px 2px var(--light);
  display:none;
  z-index:10;
  resize:both;
  overflow:hidden;
}

/* Title Bar */
.title-bar{
  background:var(--title);
  color:white;
  padding:3px;
  font-size:13px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:grab;
}

.title-buttons{
  display:flex;
  gap:4px;
}

.close-btn{
  width:18px;
  height:18px;
  background:var(--win);
  border:1px solid var(--light);
  box-shadow: inset -2px -2px var(--dark), inset 2px 2px var(--light);
  text-align:center;
  line-height:14px;
  cursor:pointer;
  font-weight:bold;
  font-size:12px;
}

/* Content */
.content{
  padding:10px;
  font-size:13px;
  height:calc(100% - 26px);
  display:flex;
  flex-direction:column;
}

button, input, textarea{
  background:var(--win);
  border:2px solid var(--light);
  box-shadow: inset -2px -2px var(--dark), inset 2px 2px var(--light);
  font-family:inherit;
}

/* Taskbar */
.taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:32px;
  background:#c0c0c0;
  border-top:2px solid #fff;
  display:flex;
  align-items:center;
}

/* Start */
.start-btn{
  margin-left:4px;
  padding:2px 10px;
  font-weight:bold;
  cursor:pointer;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
}

/* Task buttons */
#taskbar-windows{
  display:flex;
  gap:4px;
  margin-left:8px;
}

.task-btn{
  padding:2px 8px;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  font-size:12px;
  cursor:pointer;
  background:#c0c0c0;
  max-width:120px;
  overflow:hidden;
  white-space:nowrap;
}

/* Clock */
.clock{
  margin-left:auto;
  margin-right:8px;
  padding:2px 8px;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  font-size:13px;
}

/* Start menu */
.start-menu{
  position:absolute;
  bottom:34px;
  left:4px;
  width:200px;
  background:#c0c0c0;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  display:none;
}

.start-header{
  background:#000080;
  color:white;
  padding:6px;
  font-weight:bold;
}

.start-item{
  padding:6px;
  cursor:pointer;
}

.start-item:hover{
  background:#000080;
  color:white;
}

canvas{background:white;border:1px solid black;}
textarea{flex:1;width:100%;resize:none;}
iframe{flex:1;width:100%;border:1px solid #000;}
</style>
</head>

<body>

<!-- Icons -->
<div class="desktop-icon" style="top:20px;left:20px;" onclick="openWindow('computer')">💻<br>Computer</div>
<div class="desktop-icon" style="top:110px;left:20px;" onclick="openWindow('notepad')">📝<br>Notepad</div>
<div class="desktop-icon" style="top:200px;left:20px;" onclick="openWindow('paint')">🎨<br>Paint</div>
<div class="desktop-icon" style="top:290px;left:20px;" onclick="openWindow('browser')">🌐<br>Browser</div>

<!-- Computer -->
<div id="computer" class="window" style="top:80px;left:150px;">
  <div class="title-bar">
    My Computer
    <div class="title-buttons">
      <div class="close-btn" onclick="minimizeWindow('computer')">-</div>
      <div class="close-btn" onclick="toggleFullscreen('computer')">☐</div>
      <div class="close-btn" onclick="closeWindow('computer')">X</div>
    </div>
  </div>
  <div class="content">
    <p>C:\ Drive</p>
    <p>A:\ Floppy</p>
    <p>Network</p>
  </div>
</div>

<!-- Notepad -->
<div id="notepad" class="window" style="top:120px;left:220px;">
  <div class="title-bar">
    Notepad
    <div class="title-buttons">
      <div class="close-btn" onclick="minimizeWindow('notepad')">-</div>
      <div class="close-btn" onclick="toggleFullscreen('notepad')">☐</div>
      <div class="close-btn" onclick="closeWindow('notepad')">X</div>
    </div>
  </div>
  <div class="content">
    <textarea></textarea>
  </div>
</div>

<!-- Paint -->
<div id="paint" class="window" style="top:160px;left:260px;">
  <div class="title-bar">
    Paint
    <div class="title-buttons">
      <div class="close-btn" onclick="minimizeWindow('paint')">-</div>
      <div class="close-btn" onclick="toggleFullscreen('paint')">☐</div>
      <div class="close-btn" onclick="closeWindow('paint')">X</div>
    </div>
  </div>
  <div class="content">
    <input type="color" id="color">
    <input type="range" id="size" min="1" max="20" value="3">
    <canvas id="canvas" width="360" height="220"></canvas>
  </div>
</div>

<!-- Browser -->
<div id="browser" class="window" style="top:100px;left:300px;">
  <div class="title-bar">
    Browser
    <div class="title-buttons">
      <div class="close-btn" onclick="minimizeWindow('browser')">-</div>
      <div class="close-btn" onclick="toggleFullscreen('browser')">☐</div>
      <div class="close-btn" onclick="closeWindow('browser')">X</div>
    </div>
  </div>
  <div class="content">
    <input id="url" placeholder="site">
    <button onclick="loadPage()">Go</button>
    <iframe id="pageFrame"></iframe>
  </div>
</div>

<!-- Start Menu -->
<div id="startMenu" class="start-menu">
  <div class="start-header">Windows 95</div>
  <div class="start-item" onclick="openWindow('computer')">My Computer</div>
  <div class="start-item" onclick="openWindow('notepad')">Notepad</div>
  <div class="start-item" onclick="openWindow('paint')">Paint</div>
  <div class="start-item" onclick="openWindow('browser')">Internet</div>
</div>

<!-- Taskbar -->
<div class="taskbar">
  <div class="start-btn" onclick="toggleStart()">Start</div>

  <div id="taskbar-windows"></div>

  <div id="clock" class="clock">12:00 AM</div>
</div>

<script>
let z=10;
let openApps={};

function openWindow(id){
  const w=document.getElementById(id);
  w.style.display='block';
  w.style.zIndex=++z;

  if(!openApps[id]){
    createTaskButton(id);
    openApps[id]=true;
  }

  closeStart();
}

function closeWindow(id){
  document.getElementById(id).style.display='none';
  const btn=document.getElementById("btn-"+id);
  if(btn) btn.remove();
  delete openApps[id];
}

function minimizeWindow(id){
  document.getElementById(id).style.display='none';
}

function toggleFullscreen(id){
  const w=document.getElementById(id);

  if(!w.dataset.full){
    w.dataset.left=w.style.left;
    w.dataset.top=w.style.top;
    w.dataset.w=w.style.width;
    w.dataset.h=w.style.height;

    w.style.left="0";
    w.style.top="0";
    w.style.width="100vw";
    w.style.height="calc(100vh - 32px)";
    w.dataset.full=1;
  } else {
    w.style.left=w.dataset.left;
    w.style.top=w.dataset.top;
    w.style.width=w.dataset.w;
    w.style.height=w.dataset.h;
    w.dataset.full="";
  }
}

function createTaskButton(id){
  const container=document.getElementById("taskbar-windows");

  const btn=document.createElement("div");
  btn.className="task-btn";
  btn.id="btn-"+id;
  btn.innerText=id;

  btn.onclick=()=>{
    const w=document.getElementById(id);
    if(w.style.display==="none"){
      w.style.display="block";
      w.style.zIndex=++z;
    } else {
      w.style.display="none";
    }
  };

  container.appendChild(btn);
}

/* Clock */
function updateClock(){
  const d=new Date();
  let h=d.getHours();
  let m=d.getMinutes();
  const am=h>=12?"PM":"AM";
  h=h%12||12;
  if(m<10)m="0"+m;
  document.getElementById("clock").textContent=h+":"+m+" "+am;
}
setInterval(updateClock,1000);
updateClock();

/* Start */
function toggleStart(){
  const m=document.getElementById("startMenu");
  m.style.display=m.style.display==="block"?"none":"block";
}
function closeStart(){
  document.getElementById("startMenu").style.display="none";
}

/* Drag */
let drag=null,ox=0,oy=0;
window.addEventListener('mousedown',e=>{
  const bar=e.target.closest('.title-bar');
  if(!bar)return;
  drag=bar.parentElement;
  ox=e.clientX-drag.offsetLeft;
  oy=e.clientY-drag.offsetTop;
  drag.style.zIndex=++z;
});
window.addEventListener('mousemove',e=>{
  if(!drag)return;
  drag.style.left=(e.clientX-ox)+'px';
  drag.style.top=(e.clientY-oy)+'px';
});
window.addEventListener('mouseup',()=>drag=null);
</script>

</body>
</html>
