<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 95</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
:root{
  --bg:#008080;
  --win:#c0c0c0;
  --dark:#000;
  --light:#fff;
  --title:#000080;
}

body, button, input, textarea, .task-btn, .start-menu, .start-item, .start-header, .title-bar{
  font-family:"MS Sans Serif", Tahoma, sans-serif;
  font-size:13px;
}

body{
  margin:0;
  background:var(--bg);
  overflow:hidden;
  user-select:none;
  -webkit-font-smoothing:none;
}

/* ICONS */
.desktop-icon{
  position:absolute;
  width:115px;
  text-align:center;
  color:white;
  font-size:17px;
  cursor:pointer;
}

/* WINDOW */
.window{
  position:absolute;
  width:420px;
  min-width:220px;
  min-height:140px;
  background:var(--win);
  border:2px solid var(--light);
  box-shadow: inset -2px -2px var(--dark), inset 2px 2px var(--light);
  display:none;
  z-index:10;
  resize:both;
  overflow:hidden;
}

/* TITLE BAR */
.title-bar{
  background:var(--title);
  color:white;
  padding:3px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:grab;
}

.title-buttons{display:flex;gap:4px;}

.close-btn{
  width:18px;
  height:18px;
  background:var(--win);
  border:1px solid var(--light);
  box-shadow: inset -2px -2px var(--dark), inset 2px 2px var(--light);
  text-align:center;
  cursor:pointer;
  font-size:12px;
}

/* CONTENT */
.content{
  padding:10px;
  height:calc(100% - 26px);
  display:flex;
  flex-direction:column;
}

button, input, textarea{
  background:var(--win);
  border:2px solid var(--light);
  box-shadow: inset -2px -2px var(--dark), inset 2px 2px var(--light);
}

/* TASKBAR */
.taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:32px;
  background:#c0c0c0;
  border-top:2px solid #fff;
  display:flex;
  align-items:center;
}

.start-btn{
  margin-left:4px;
  padding:2px 10px;
  font-weight:bold;
  cursor:pointer;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
}

#taskbar-windows{display:flex;gap:4px;margin-left:8px;}

.task-btn{
  padding:2px 8px;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  cursor:pointer;
  background:#c0c0c0;
  max-width:120px;
  overflow:hidden;
  white-space:nowrap;
}

.clock{
  margin-left:auto;
  margin-right:8px;
  padding:2px 8px;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
}

/* START MENU */
.start-menu{
  position:absolute;
  bottom:34px;
  left:4px;
  width:200px;
  background:#c0c0c0;
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
  display:none;
}

.start-header{background:#000080;color:white;padding:6px;font-weight:bold;}

.start-item{padding:6px;cursor:pointer;}
.start-item:hover{background:#000080;color:white;}

/* browser */
iframe{flex:1;width:100%;border:1px solid #000;}
textarea{flex:1;width:100%;resize:none;}
canvas{background:white;border:1px solid black;}
</style>
</head>

<body>

<!-- DESKTOP -->
<div class="desktop-icon" style="top:20px;left:20px;" onclick="openWindow('computer')">💻<br>Computer</div>
<div class="desktop-icon" style="top:110px;left:20px;" onclick="openWindow('notepad')">📝<br>Notepad</div>
<div class="desktop-icon" style="top:200px;left:20px;" onclick="openWindow('paint')">🎨<br>Paint</div>
<div class="desktop-icon" style="top:290px;left:20px;" onclick="openWindow('browser')">🌐<br>Browser</div>

<!-- COMPUTER -->
<div id="computer" class="window" style="top:80px;left:150px;">
  <div class="title-bar">
    Computer
    <div class="title-buttons">
      <div class="close-btn" onclick="minimizeWindow('computer')">-</div>
      <div class="close-btn" onclick="toggleFullscreen('computer')">☐</div>
      <div class="close-btn" onclick="closeWindow('computer')">X</div>
    </div>
  </div>
  <div class="content">
    <p>C:\ Drive</p>
    <p>A:\ Floppy</p>
  </div>
</div>

<!-- NOTEPAD -->
<div id="notepad" class="window" style="top:120px;left:220px;">
  <div class="title-bar">
    Notepad
    <div class="title-buttons">
      <div class="close-btn" onclick="minimizeWindow('notepad')">-</div>
      <div class="close-btn" onclick="toggleFullscreen('notepad')">☐</div>
      <div class="close-btn" onclick="closeWindow('notepad')">X</div>
    </div>
  </div>
  <div class="content">
    <textarea></textarea>
  </div>
</div>

<!-- PAINT -->
<div id="paint" class="window" style="top:160px;left:260px;">
  <div class="title-bar">
    Paint
    <div class="title-buttons">
      <div class="close-btn" onclick="minimizeWindow('paint')">-</div>
      <div class="close-btn" onclick="toggleFullscreen('paint')">☐</div>
      <div class="close-btn" onclick="closeWindow('paint')">X</div>
    </div>
  </div>
  <div class="content">
    <input type="color" id="color">
    <input type="range" id="size" min="1" max="20" value="3">
    <canvas id="canvas" width="360" height="220"></canvas>
  </div>
</div>

<!-- BROWSER -->
<div id="browser" class="window" style="top:100px;left:300px;">
  <div class="title-bar">
    Internet Explorer
    <div class="title-buttons">
      <div class="close-btn" onclick="minimizeWindow('browser')">-</div>
      <div class="close-btn" onclick="toggleFullscreen('browser')">☐</div>
      <div class="close-btn" onclick="closeWindow('browser')">X</div>
    </div>
  </div>

  <div class="content">

    <div style="display:flex;gap:4px;">
      <button onclick="goBack()">◀</button>
      <button onclick="goForward()">▶</button>
      <input id="url" style="flex:1;" placeholder="google / youtube / site">
      <button onclick="loadPage()">Go</button>
    </div>

    <div id="status">Ready</div>

    <div id="loadBar" style="height:8px;background:#fff;border:1px solid #000;"></div>

    <div id="browserView" style="flex:1;background:white;border:1px solid #000;padding:6px;overflow:auto;">
      <h3>Windows 95 Internet</h3>
    </div>

  </div>
</div>

<!-- START -->
<div id="startMenu" class="start-menu">
  <div class="start-header">Windows 95</div>
  <div class="start-item" onclick="openWindow('computer')">Computer</div>
  <div class="start-item" onclick="openWindow('notepad')">Notepad</div>
  <div class="start-item" onclick="openWindow('paint')">Paint</div>
  <div class="start-item" onclick="openWindow('browser')">Internet</div>
</div>

<!-- TASKBAR -->
<div class="taskbar">
  <div class="start-btn" onclick="toggleStart()">Start</div>
  <div id="taskbar-windows"></div>
  <div id="clock" class="clock">12:00 AM</div>
</div>

<script>
let z=10;
let openApps={};
let history=[],index=-1;

/* WINDOWS */
function openWindow(id){
  const w=document.getElementById(id);
  w.style.display='block';
  w.style.zIndex=++z;

  if(!openApps[id]){
    const b=document.createElement("div");
    b.className="task-btn";
    b.innerText=id;
    b.onclick=()=>w.style.display=(w.style.display==="none"?"block":"none");
    document.getElementById("taskbar-windows").appendChild(b);
    openApps[id]=true;
  }

  closeStart();
}

function closeWindow(id){
  document.getElementById(id).style.display='none';
}

function minimizeWindow(id){
  document.getElementById(id).style.display='none';
}

function toggleFullscreen(id){
  const w=document.getElementById(id);
  if(!w.dataset.f){
    w.dataset.f=1;
    w.dataset.l=w.style.left;
    w.dataset.t=w.style.top;
    w.dataset.w=w.style.width;
    w.dataset.h=w.style.height;

    w.style.left="0";
    w.style.top="0";
    w.style.width="100vw";
    w.style.height="calc(100vh - 32px)";
  }else{
    w.dataset.f="";
    w.style.left=w.dataset.l;
    w.style.top=w.dataset.t;
    w.style.width=w.dataset.w;
    w.style.height=w.dataset.h;
  }
}

/* CLOCK */
setInterval(()=>{
  const d=new Date();
  let h=d.getHours(),m=d.getMinutes();
  const a=h>=12?"PM":"AM";
  h=h%12||12;
  if(m<10)m="0"+m;
  document.getElementById("clock").textContent=h+":"+m+" "+a;
},1000);

/* START */
function toggleStart(){
  const m=document.getElementById("startMenu");
  m.style.display=m.style.display==="block"?"none":"block";
}
function closeStart(){
  document.getElementById("startMenu").style.display="none";
}

/* BROWSER (SIMPLE SAFE VERSION) */
function loadPage(){
  const url=document.getElementById("url").value;
  const v=document.getElementById("browserView");

  if(url.includes("youtube.com")){
    v.innerHTML="YouTube detected (simulated load)";
  }else if(url==="google"){
    v.innerHTML="<h3>Google 1998</h3><input><button>Search</button>";
  }else{
    v.innerHTML="<h3>Blocked Page</h3><p>"+url+"</p>";
  }
}

/* DRAG */
let drag=null,ox=0,oy=0;
window.onmousedown=e=>{
  const t=e.target.closest(".title-bar");
  if(!t)return;
  drag=t.parentElement;
  ox=e.clientX-drag.offsetLeft;
  oy=e.clientY-drag.offsetTop;
  drag.style.zIndex=++z;
};
window.onmousemove=e=>{
  if(!drag)return;
  drag.style.left=(e.clientX-ox)+"px";
  drag.style.top=(e.clientY-oy)+"px";
};
window.onmouseup=()=>drag=null;
</script>

</body>
</html>
