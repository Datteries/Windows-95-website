<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Windows 95</title>
<link rel="icon" type="image/png" href="icon.png">

<style>
:root{
  --bg:#008080;
  --win:#c0c0c0;
  --dark:#000;
  --light:#fff;
  --title:#000080;
}

body{
  margin:0;
  background:var(--bg);
  overflow:hidden;
  user-select:none;
  font-family:"MS Sans Serif", Tahoma, sans-serif;
  font-size:13px;
}

/* ICONS */
.desktop-icon{
  position:absolute;
  width:120px;
  text-align:center;
  color:white;
  cursor:pointer;
}

/* WINDOW */
.window{
  position:absolute;
  width:420px;
  min-height:150px;
  background:var(--win);
  border:2px solid var(--light);
  box-shadow: inset -2px -2px var(--dark), inset 2px 2px var(--light);
  display:none;
  resize:both;
  overflow:hidden;
}

/* TITLE BAR */
.title-bar{
  background:var(--title);
  color:white;
  padding:3px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  cursor:grab;
}

.close-btn{
  width:18px;
  height:18px;
  background:var(--win);
  border:1px solid #fff;
  cursor:pointer;
  text-align:center;
}

/* CONTENT */
.content{
  padding:10px;
  display:flex;
  flex-direction:column;
  height:calc(100% - 26px);
}

button,input{
  background:var(--win);
  border:2px solid #fff;
  box-shadow: inset -2px -2px #000, inset 2px 2px #fff;
}

/* TASKBAR */
.taskbar{
  position:fixed;
  bottom:0;
  width:100%;
  height:32px;
  background:#c0c0c0;
  border-top:2px solid #fff;
  display:flex;
  align-items:center;
}

.start-btn{
  margin-left:4px;
  padding:2px 10px;
  font-weight:bold;
  cursor:pointer;
  border:2px solid #fff;
}

.clock{
  margin-left:auto;
  margin-right:10px;
  padding:2px 8px;
  border:2px solid #fff;
}

/* START MENU */
.start-menu{
  position:absolute;
  bottom:34px;
  left:4px;
  width:200px;
  background:#c0c0c0;
  border:2px solid #fff;
  display:none;
}

.start-header{
  background:#000080;
  color:white;
  padding:5px;
}

.start-item{
  padding:6px;
  cursor:pointer;
}

.start-item:hover{
  background:#000080;
  color:white;
}
</style>
</head>

<body>

<!-- DESKTOP -->
<div class="desktop-icon" style="top:20px;left:20px;" onclick="openWindow('computer')">💻<br>Computer</div>
<div class="desktop-icon" style="top:110px;left:20px;" onclick="openWindow('notepad')">📝<br>Notepad</div>
<div class="desktop-icon" style="top:200px;left:20px;" onclick="openWindow('browser')">🌐<br>Browser</div>

<!-- COMPUTER -->
<div id="computer" class="window" style="top:80px;left:150px;">
  <div class="title-bar">Computer
    <div class="close-btn" onclick="closeWindow('computer')">X</div>
  </div>
  <div class="content">
    <p>C:\ Drive</p>
    <p>A:\ Floppy</p>
  </div>
</div>

<!-- NOTEPAD -->
<div id="notepad" class="window" style="top:120px;left:220px;">
  <div class="title-bar">Notepad
    <div class="close-btn" onclick="closeWindow('notepad')">X</div>
  </div>
  <div class="content">
    <textarea style="flex:1"></textarea>
  </div>
</div>

<!-- BROWSER -->
<div id="browser" class="window" style="top:100px;left:300px;">
  <div class="title-bar">Internet Explorer
    <div class="close-btn" onclick="closeWindow('browser')">X</div>
  </div>

  <div class="content">

    <div style="display:flex;gap:4px;">
      <input id="url" style="flex:1" placeholder="youtube / google / github / site">
      <button onclick="loadPage()">Go</button>
    </div>

    <div id="status">Ready</div>

    <div id="loadBar" style="height:6px;background:white;width:0%"></div>

    <div style="margin-top:8px;">
      <button onclick="quick('google')">Google</button>
      <button onclick="quick('youtube')">YouTube</button>
      <button onclick="quick('github')">GitHub</button>
    </div>

  </div>
</div>

<!-- START -->
<div id="startMenu" class="start-menu">
  <div class="start-header">Windows 95</div>
  <div class="start-item" onclick="openWindow('computer')">Computer</div>
  <div class="start-item" onclick="openWindow('notepad')">Notepad</div>
  <div class="start-item" onclick="openWindow('browser')">Internet</div>
</div>

<!-- TASKBAR -->
<div class="taskbar">
  <div class="start-btn" onclick="toggleStart()">Start</div>
  <div class="clock" id="clock">12:00 AM</div>
</div>

<script>
function openWindow(id){
  document.getElementById(id).style.display="block";
}

function closeWindow(id){
  document.getElementById(id).style.display="none";
}

function toggleStart(){
  const m=document.getElementById("startMenu");
  m.style.display = m.style.display==="block"?"none":"block";
}

/* CLOCK */
setInterval(()=>{
  const d=new Date();
  let h=d.getHours(),m=d.getMinutes();
  const a=h>=12?"PM":"AM";
  h=h%12||12;
  if(m<10)m="0"+m;
  document.getElementById("clock").innerText=`${h}:${m} ${a}`;
},1000);

/* SMART BROWSER */
function smartURL(input){
  input=input.toLowerCase().trim();

  if(input.includes("youtube")){
    return "https://www.youtube.com/results?search_query="+encodeURIComponent(input);
  }

  if(input.includes("google")){
    return "https://www.google.com/search?q="+encodeURIComponent(input);
  }

  if(input.includes("github")){
    return "https://github.com/search?q="+encodeURIComponent(input);
  }

  if(!input.startsWith("http")){
    return "https://"+input;
  }

  return input;
}

/* REAL FIX: OPEN IN NEW TAB */
function loadPage(){
  let url=document.getElementById("url").value;
  url=smartURL(url);

  document.getElementById("status").innerText="Opening...";

  let bar=document.getElementById("loadBar");
  bar.style.width="0%";

  let p=0;
  let i=setInterval(()=>{
    p+=20;
    bar.style.width=p+"%";
    if(p>=100) clearInterval(i);
  },50);

  setTimeout(()=>{
    window.open(url,"_blank"); // ✅ THIS FIXES EVERYTHING
    document.getElementById("status").innerText="Opened in new tab";
  },300);
}

/* QUICK BUTTONS */
function quick(site){
  let url="";
  if(site==="google") url="https://google.com";
  if(site==="youtube") url="https://youtube.com";
  if(site==="github") url="https://github.com";

  window.open(url,"_blank");
}
</script>

</body>
</html>
